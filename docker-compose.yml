services:
  mysql:
    image: mysql:8.0.27
    container_name: learning-growth-mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: '010511'
      MYSQL_DATABASE: learning_growth
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-p010511']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  mysql-data:
